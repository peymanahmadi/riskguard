version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - bodyclose
  settings:
    govet:
      disable:
        # fieldalignment optimizes struct memory layout by field size, at
        # the cost of grouping fields the way a human reads them (e.g.
        # Transaction.EntityID next to AmountMinor next to Currency). None
        # of our structs are allocated at a scale where the padding savings
        # matter; readability wins here. Revisit for specific hot-path
        # types (e.g. RuleResult) if profiling ever shows struct padding as
        # a real cost.
        - fieldalignment

  exclusions:
    paths:
      - vendor
      - .git
      - test
      - third_party

formatters:
  enable:
    - gofmt
    - goimports