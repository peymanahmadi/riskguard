name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (core library, race detector, coverage)
        run: go test ./pkg/... -race -coverprofile=coverage.out

      - name: Build everything
        run: go build ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: 2.12.2

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: riskguard
          POSTGRES_PASSWORD: riskguard
          POSTGRES_DB: riskguard
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U riskguard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Run Kafka (KRaft, single node)
        run: |
          docker run -d --name kafka --network host \
            -e KAFKA_NODE_ID=1 \
            -e KAFKA_PROCESS_ROLES=broker,controller \
            -e CLUSTER_ID=ci-cluster-1 \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093 \
            -e KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            confluentinc/cp-kafka:8.2.2
          
          # Wait for Kafka to be ready
          for i in {1..30}; do
            if docker exec kafka kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1; then
              echo "Kafka is ready"
              break
            fi
            echo "Waiting for Kafka... ($i/30)"
            sleep 1
          done

      - name: Integration tests
        env:
          DATABASE_URL: "postgres://riskguard:riskguard@localhost:5432/riskguard?sslmode=disable"
          KAFKA_BROKERS: "localhost:9092"
        run: go test ./test/integration/... -tags=integration -v
